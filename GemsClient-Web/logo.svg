<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Filtro para el brillo neón cian técnico -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur3" />
      <feMerge>
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Grupo del diamante con el efecto neón aplicado -->
  <g stroke="#00FFFF" fill="none" filter="url(#neon)" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Silueta exterior del diamante -->
    <polygon points="60,15 105,45 60,105 15,45" stroke-width="3" />
    
    <!-- Línea horizontal central -->
    <line x1="15" y1="45" x2="105" y2="45" stroke-width="2" />
    
    <!-- Triángulo interno (Estilo fragmentado/PvP) -->
    <polygon points="35,45 60,85 85,45" stroke-width="2" />
    
    <!-- Líneas diagonales superiores -->
    <line x1="60" y1="15" x2="35" y2="45" stroke-width="2" />
    <line x1="60" y1="15" x2="85" y2="45" stroke-width="2" />
    
    <!-- Línea vertical central -->
    <line x1="60" y1="15" x2="60" y2="45" stroke-width="2" />
    
    <!-- Nodos tecnológicos (Puntos de conexión estilo circuito) -->
    <circle cx="60" cy="15" r="2.5" fill="#00FFFF" stroke="none" />
    <circle cx="15" cy="45" r="2.5" fill="#00FFFF" stroke="none" />
    <circle cx="105" cy="45" r="2.5" fill="#00FFFF" stroke="none" />
    <circle cx="60" cy="105" r="2.5" fill="#00FFFF" stroke="none" />
    <circle cx="60" cy="85" r="2" fill="#00FFFF" stroke="none" />
  </g>
</svg>
